<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Delícias da Páscoa</title>

<style>

body{
font-family: Arial;
margin:0;
background: radial-gradient(circle,#fce4ec 2px, transparent 2px);
background-size:40px 40px;
background-color:#fff0f5;
}

/* TOPO */

header{
background:#7b3f2a;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

/* AREA PEDIDO */

.card{

background:white;
width:500px;
margin:40px auto;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);

}

/* IMAGENS */

.galeria{

display:flex;
justify-content:center;
gap:15px;
margin-bottom:20px;

}

.galeria img{

width:120px;
height:120px;
object-fit:cover;
border-radius:10px;

}

button{

background:#2ecc71;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:16px;

}

button:hover{

background:#27ae60;

}

select,input{

padding:5px;

}

</style>
</head>

<body>

<header>
🐰 Delícias da Páscoa 🍫
</header>


<div class="card">

<h2>🍫 Monte seu pedido</h2>

<!-- IMAGENS -->

<div class="galeria">

<img src="oreo.jpg">
<img src="ninho.jpg">
<img src="brigadeiro.jpg">

</div>

<p>Preço do ovo 300g: <b>R$50</b></p>

<label>Quantidade de ovos (máx 5):</label>
<input type="number" id="quantidade" min="1" max="5" value="1" onchange="gerarOvos()">

<div id="ovos"></div>

<br>

<button onclick="comprar()">Comprar pelo WhatsApp</button>

</div>

<script>

const precoOvo = 50;
const precoComplemento = 2;

function gerarOvos(){

let qtd = document.getElementById("quantidade").value;
let area = document.getElementById("ovos");

area.innerHTML = "";

for(let i=1;i<=qtd;i++){

area.innerHTML += `

<hr>

<h3>Ovo ${i}</h3>

<label>Sabor:</label>

<select id="sabor${i}">
<option>Oreo</option>
<option>Ninho</option>
<option>Brigadeiro</option>
<option>Brigadeiro com Morango</option>
<option>Brigadeiro com Uva Verde</option>
</select>

<br><br>

<label>Complemento (+R$2):</label>

<select id="comp${i}">
<option value="">Sem complemento</option>
<option>Paçoca</option>
<option>Leite Ninho</option>
<option>Amendoim</option>
</select>

`;

}

}

gerarOvos();

function comprar(){

let qtd = document.getElementById("quantidade").value;

let total = 0;

let mensagem = "🍫 Pedido de Ovos de Páscoa %0A";

mensagem += "Quantidade de ovos: " + qtd + "%0A%0A";

for(let i=1;i<=qtd;i++){

let sabor = document.getElementById("sabor"+i).value;
let comp = document.getElementById("comp"+i).value;

let preco = precoOvo;

mensagem += "Ovo "+i+": "+sabor;

if(comp != ""){

mensagem += " | Complemento: "+comp+" (+R$2)";
preco += precoComplemento;

}

mensagem += "%0A";

total += preco;

}

mensagem += "%0A💰 Preço total: R$"+total;

let url = "https://wa.me/5527996192066?text=" + mensagem;

window.open(url,"_blank");

}

</script>

</body>
</html>
