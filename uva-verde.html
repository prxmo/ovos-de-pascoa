<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ovo de Brigadeiro com Uva verde</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topo">🐰 Delícias da Páscoa 🍫</header>

<main>

<div class="produto-detalhe">

<div class="produto-imagem">
<img src="assets/ovo-uva-verde.webp">
</div>

<div class="produto-info">

<h1>Ovo de Brigadeiro com Uva verde</h1>

<label>Quantidade</label> <input type="number" id="qtd" value="1" min="1" max="5" oninput="limitarQtd(); calcularPreco(55)">




<div class="extras">
<label><input type="checkbox" class="extra" data-nome="Amemdoim" value="2" onchange="calcularPreco(55)"> Amendoim +2</label>
<label><input type="checkbox" class="extra" data-nome="Leite Ninho" value="2" onchange="calcularPreco(55)"> Leite ninho +2</label>
<label><input type="checkbox" class="extra" data-nome="Paçoca" value="2" onchange="calcularPreco(55)"> Paçoca +2</label>
</div>

<h2 id="precoAtual">Total: R$55</h2>

<button class="btn-add" onclick="adicionarProduto('Ovo de Brigadeiro com Uva verde',55)">
Adicionar ao carrinho 🛒
</button>

<a href="index.html">
<button class="btn-voltar">← Voltar</button>
</a>

</div>

</div>

</main>

<footer class="rodape">
© 2026 Delícias da Páscoa
</footer>

<!-- BOTÃO CARRINHO -->

<div class="carrinho-btn" onclick="toggleCarrinho()">
🛒
<div class="carrinho-contador" id="contador">0</div>
</div>

<!-- PAINEL -->

<div class="carrinho-painel" id="painelCarrinho">

<h2>Seu Carrinho</h2>

<div id="lista"></div>

<h3 id="total"></h3>

<button onclick="limparCarrinho()" class="btn-limpar">
🗑️ Limpar Carrinho
</button>

<button onclick="finalizar()" class="btn-finalizar">
Finalizar no WhatsApp
</button>

</div>

<script src="carrinho.js"></script>

</body>
</html>
